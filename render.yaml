services:
  - type: web
    name: OmniAgent-2
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    # Force Render to map the internal port correctly
    envVars:
      - key: PORT
        value: "10000"
      - key: your_groq_api_key_here
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: "*"
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: LOG_LEVEL
        value: INFO
      - key: WHISPER_MODEL_SIZE
        value: base

  - type: web
    name: omniagent-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: OmniAgent-2
          type: web
          property: host
