services:
  - type: web
    name: omniagent-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: grod_api_key
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: "*"
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: LOG_LEVEL
        value: INFO
      - key: WHISPER_MODEL_SIZE
        value: base

  - type: web
    name: omniagent-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: omniagent-api
          type: web
          property: host
